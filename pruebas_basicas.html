<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Pruebas Básicas · Charly Táctico</title>
  <link rel="icon" href="./favicon.ico" sizes="any"/>
  <link rel="icon" href="./icons/icon-32.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./icons/icon-180.png"/>
  <meta name="theme-color" content="#080C10"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#080C10;--navy2:#0d1117;--navy3:#13191f;
      --gold:#C9A84C;--gold2:#e5c46a;
      --chalk:#F0F4F8;--muted:#8892a0;
      --border:rgba(201,168,76,.15);
      --blue:#6ab0e8;
    }
    html,body{background:var(--black);color:var(--chalk);font-family:'Barlow',sans-serif;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(201,168,76,.022) 1px,transparent 1px),
        linear-gradient(90deg,rgba(201,168,76,.022) 1px,transparent 1px);
      background-size:52px 52px;pointer-events:none;z-index:0}

    .topbar{position:fixed;top:0;left:0;right:0;height:54px;
      background:rgba(8,12,16,.93);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 18px;z-index:100;gap:10px}
    .tb-back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
      background:none;border:none;cursor:pointer;text-decoration:none;
      display:flex;align-items:center;gap:5px;padding:6px 10px;transition:color .2s}
    .tb-back:hover{color:var(--gold)}
    .tb-brand{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.05em;color:var(--gold)}
    .tb-brand span{color:var(--chalk)}
    .tb-sep{flex:1}

    .app{padding-top:54px;min-height:100vh;display:flex;flex-direction:column;
      align-items:center;position:relative;z-index:1;padding-bottom:60px}

    .hero{width:100%;max-width:700px;padding:36px 20px 12px}
    .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
    .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,12vw,68px);
      line-height:.9;margin-bottom:6px}
    .hero-sub{font-family:'Barlow Condensed',sans-serif;font-size:13px;
      letter-spacing:.06em;color:var(--muted)}

    .section{width:100%;max-width:700px;padding:28px 20px 8px}

    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}

    .card{background:var(--navy2);border:1px solid var(--border);
      padding:28px 20px 22px;cursor:pointer;text-decoration:none;
      display:flex;flex-direction:column;align-items:flex-start;
      position:relative;overflow:hidden;transition:border-color .18s,background .18s}
    .card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:var(--blue);transform:scaleX(0);transition:transform .18s}
    .card:hover{border-color:rgba(106,176,232,.5);background:var(--navy3)}
    .card:hover::after{transform:scaleX(1)}

    .card-ico{font-size:32px;margin-bottom:12px;line-height:1}
    .card-name{font-family:'Bebas Neue',sans-serif;font-size:20px;
      letter-spacing:.06em;color:var(--chalk);line-height:1.1;margin-bottom:6px}
    .card-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;
      letter-spacing:.04em;color:var(--muted);flex:1;line-height:1.4;margin-bottom:14px}
    .card-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
      letter-spacing:.2em;text-transform:uppercase;padding:3px 8px;border:1px solid;
      color:var(--blue);border-color:rgba(106,176,232,.4);background:rgba(106,176,232,.06)}

    @media(max-width:480px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="topbar">
  <a class="tb-back" href="./practicar.html">← Volver</a>
  <div class="tb-brand">CHARLY <span>TÁCTICO</span></div>
  <div class="tb-sep"></div>
</div>

<div class="app">
  <div class="hero">
    <div class="eyebrow">Portal del Alumno</div>
    <div class="hero-title">PRUEBAS<br><span style="color:var(--gold)">BÁSICAS</span></div>
    <div class="hero-sub">Vocabulario y operaciones fundamentales</div>
  </div>

  <div class="section">
    <div class="grid">
      <a class="card" href="./quiz_definiciones.html">
        <div class="card-ico">📖</div>
        <div class="card-name">Prueba Vocabulario</div>
        <div class="card-sub">Definiciones · Significados</div>
        <span class="card-tag">Test</span>
      </a>
      <a class="card" href="./prueba_mate_basica.html">
        <div class="card-ico">🔢</div>
        <div class="card-name">Mate Básica</div>
        <div class="card-sub">Operaciones · Selección proporcional por tema</div>
        <span class="card-tag">Test</span>
      </a>
    </div>
  </div>
</div>

</body>
</html>
