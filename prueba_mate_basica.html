<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Mate Básica · Charly Táctico</title>
  <link rel="icon" href="./favicon.ico" sizes="any"/>
  <link rel="icon" href="./icons/icon-32.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./icons/icon-180.png"/>
  <meta name="theme-color" content="#080C10"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script>MathJax={tex:{inlineMath:[['$','$']],displayMath:[['$$','$$']]},startup:{typeset:false}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#080C10;--navy2:#0d1117;--navy3:#13191f;
      --gold:#C9A84C;--gold2:#e5c46a;
      --chalk:#F0F4F8;--muted:#8892a0;
      --border:rgba(201,168,76,.15);
      --red:#E05555;--green:#4CAF7D;
    }
    html,body{background:var(--black);color:var(--chalk);font-family:'Barlow',sans-serif;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(201,168,76,.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(201,168,76,.02) 1px,transparent 1px);
      background-size:52px 52px;pointer-events:none;z-index:0}

    .topbar{position:fixed;top:0;left:0;right:0;height:54px;
      background:rgba(8,12,16,.94);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 18px;z-index:100;gap:10px}
    .tb-back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
      background:none;border:none;cursor:pointer;text-decoration:none;
      display:flex;align-items:center;gap:5px;padding:6px 10px;transition:color .2s}
    .tb-back:hover{color:var(--gold)}
    .tb-brand{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.05em;color:var(--gold)}
    .tb-brand span{color:var(--chalk)}
    .tb-sep{flex:1}

    .app{padding-top:54px;min-height:100vh;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}

    .screen{display:none;width:100%;max-width:600px;padding:32px 20px 60px;flex-direction:column}
    .screen.active{display:flex}

    /* Setup */
    .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
    .big-title{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:.9;margin-bottom:10px}
    .sub-txt{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.06em;color:var(--muted);margin-bottom:28px}

    .tema-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
    .tema-chip{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
      padding:4px 10px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.22);color:var(--muted)}

    .qty-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.25em;
      text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .qty-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
    .qty-btn{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;
      width:68px;height:68px;background:var(--navy2);border:1px solid var(--border);
      color:var(--muted);cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
    .qty-btn:hover,.qty-btn.sel{background:var(--navy3);border-color:var(--gold);color:var(--gold)}
    .qty-btn.sel{box-shadow:0 0 0 1px var(--gold)}

    .btn-start{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.2em;
      text-transform:uppercase;padding:14px 32px;background:var(--gold);color:var(--black);
      border:none;cursor:pointer;transition:background .18s;align-self:flex-start}
    .btn-start:hover{background:var(--gold2)}
    .btn-start:disabled{opacity:.4;cursor:not-allowed}

    /* Quiz */
    .progress-bar{width:100%;height:3px;background:rgba(201,168,76,.1);margin-bottom:10px}
    .progress-fill{height:100%;background:var(--gold);transition:width .3s}
    .progress-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.15em;
      color:var(--muted);text-align:right;margin-bottom:20px}

    .tema-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.25em;
      text-transform:uppercase;color:var(--gold);margin-bottom:10px}

    .q-card{background:var(--navy2);border:1px solid var(--border);padding:28px 24px;margin-bottom:14px;min-height:100px}
    .q-text{font-size:18px;line-height:1.6;color:var(--chalk)}

    .answer-block{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.28);
      padding:18px 22px;margin-bottom:18px;display:none}
    .answer-block.visible{display:block}
    .answer-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.25em;
      text-transform:uppercase;color:var(--gold);margin-bottom:8px}
    .answer-text{font-size:20px;font-weight:600;color:var(--gold);line-height:1.4}

    .btn-reveal{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.2em;
      text-transform:uppercase;padding:12px 28px;background:var(--navy3);border:1px solid var(--border);
      color:var(--chalk);cursor:pointer;transition:all .18s;width:100%;margin-bottom:12px}
    .btn-reveal:hover{border-color:var(--gold);color:var(--gold)}

    .action-row{display:flex;gap:10px}
    .btn-ok{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;
      text-transform:uppercase;padding:14px;background:var(--green);color:#fff;border:none;cursor:pointer;transition:filter .18s}
    .btn-ok:hover{filter:brightness(1.12)}
    .btn-ko{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;
      text-transform:uppercase;padding:14px;background:transparent;border:1px solid var(--red);color:var(--red);cursor:pointer;transition:all .18s}
    .btn-ko:hover{background:var(--red);color:#fff}

    /* Result */
    .result-score{font-family:'Bebas Neue',sans-serif;font-size:86px;line-height:.9;color:var(--gold);margin-bottom:4px}
    .result-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:.1em;color:var(--muted);margin-bottom:32px}
    .result-bars{width:100%;margin-bottom:32px;display:flex;flex-direction:column;gap:10px}
    .bar-row{display:flex;align-items:center;gap:10px}
    .bar-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.05em;
      color:var(--muted);width:110px;flex-shrink:0;text-transform:capitalize}
    .bar-track{flex:1;height:6px;background:rgba(255,255,255,.06)}
    .bar-fill{height:100%;background:var(--gold);transition:width .5s}
    .bar-pct{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--gold);width:36px;text-align:right}

    .btn-retry{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.18em;
      text-transform:uppercase;padding:12px 24px;background:var(--navy2);border:1px solid var(--border);
      color:var(--chalk);cursor:pointer;transition:all .18s;margin-right:10px}
    .btn-retry:hover{border-color:var(--gold);color:var(--gold)}
    .btn-home{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.18em;
      text-transform:uppercase;padding:12px 24px;background:var(--gold);color:var(--black);
      border:none;cursor:pointer;transition:background .18s}
    .btn-home:hover{background:var(--gold2)}

    /* Loading */
    .loading-state{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:14px}
    .spinner{width:32px;height:32px;border:2px solid rgba(201,168,76,.18);border-top-color:var(--gold);
      border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-txt{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

    @media(max-width:480px){.qty-btn{width:58px;height:58px;font-size:22px}}
  </style>
</head>
<body>

<div class="topbar">
  <a class="tb-back" href="./practicar.html">← Volver</a>
  <div class="tb-brand">CHARLY <span>TÁCTICO</span></div>
  <div class="tb-sep"></div>
</div>

<div class="app">

  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <div class="load-txt">Cargando banco…</div>
  </div>

  <!-- SETUP -->
  <div class="screen" id="screen-setup">
    <div class="eyebrow">Prueba Básica</div>
    <div class="big-title">MATE<br>BÁSICA</div>
    <div class="sub-txt">Operaciones fundamentales · Selección proporcional por tema</div>
    <div class="tema-list" id="tema-list"></div>
    <div class="qty-label">¿Cuántas preguntas?</div>
    <div class="qty-grid" id="qty-grid"></div>
    <button class="btn-start" id="btn-start" onclick="startQuiz()" disabled>Comenzar</button>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-txt" id="prog-txt"></div>
    <div class="tema-badge" id="q-tema"></div>
    <div class="q-card"><div class="q-text" id="q-text"></div></div>
    <div class="answer-block" id="answer-block">
      <div class="answer-label">Respuesta</div>
      <div class="answer-text" id="q-answer"></div>
    </div>
    <button class="btn-reveal" id="btn-reveal" onclick="revealAnswer()">Ver Respuesta</button>
    <div class="action-row" id="action-row" style="display:none">
      <button class="btn-ok" onclick="markAnswer(true)">✓ Correcto</button>
      <button class="btn-ko" onclick="markAnswer(false)">✗ Incorrecta</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="eyebrow">Resultado</div>
    <div class="result-score" id="res-score"></div>
    <div class="result-label" id="res-label"></div>
    <div class="result-bars" id="res-bars"></div>
    <div>
      <button class="btn-retry" onclick="showSetup()">Otra vuelta</button>
      <button class="btn-home" onclick="window.location.href='./practicar.html'">Inicio</button>
    </div>
  </div>

</div>

<script>
const SB_URL = 'https://jfczouzgikqxcnotukag.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmY3pvdXpnaWtxeGNub3R1a2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODU1NjgsImV4cCI6MjA4ODg2MTU2OH0.Q8MRAj-AFPm8fsJsg52hxDSMdjf9YJRuGbhs4WrOEcA';
const sb = supabase.createClient(SB_URL, SB_KEY);

let grouped = {};
let pool = [];
let current = 0;
let score = 0;
let subtemaScore = {};
let selectedQty = 0;

function parseQA(texto) {
  if (!texto) return null;
  const m = texto.match(/\[\[([^\]]+)\],\s*\[([^\]]+)\]\]/);
  return m ? { q: m[1].trim(), a: m[2].trim() } : null;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function selectProportional(grouped, total) {
  const keys = Object.keys(grouped).filter(k => grouped[k].length > 0);
  if (!keys.length) return [];
  const counts = keys.map(k => grouped[k].length);
  const totalItems = counts.reduce((s, c) => s + c, 0);
  const actualTotal = Math.min(total, totalItems);
  let allocs = keys.map((k, i) => ({
    key: k,
    n: Math.floor((counts[i] / totalItems) * actualTotal),
    rem: ((counts[i] / totalItems) * actualTotal) % 1
  }));
  let assigned = allocs.reduce((s, a) => s + a.n, 0);
  allocs.sort((a, b) => b.rem - a.rem);
  for (let i = 0; i < actualTotal - assigned; i++) allocs[i].n++;
  const result = [];
  for (const alloc of allocs) {
    const items = shuffle([...grouped[alloc.key]]);
    result.push(...items.slice(0, alloc.n));
  }
  return shuffle(result);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = './login.html?next=prueba_mate_basica.html'; return; }

  const { data: mats } = await sb.from('materias').select('id,nombre,codigo');
  const mat = (mats || []).find(m =>
    (m.codigo || '').toUpperCase() === 'MA-01' || /matem/i.test(m.nombre)
  );

  if (!mat) {
    document.getElementById('loading-state').innerHTML =
      `<div style="color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.1em;text-align:center">Materia MA-01 no encontrada</div>`;
    return;
  }

  const { data: rows } = await sb.from('banco_preguntas')
    .select('id,subtema,enunciado_texto')
    .eq('materia_id', mat.id);

  grouped = {};
  for (const row of (rows || [])) {
    const qa = parseQA(row.enunciado_texto);
    if (!qa) continue;
    const tema = (row.subtema || 'General').replace(/:$/, '');
    if (!grouped[tema]) grouped[tema] = [];
    grouped[tema].push({ q: qa.q, a: qa.a, subtema: tema });
  }

  const totalAvailable = Object.values(grouped).reduce((s, a) => s + a.length, 0);

  if (!totalAvailable) {
    document.getElementById('loading-state').innerHTML =
      `<div style="color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.1em;text-align:center;padding:20px">Aún no hay preguntas cargadas con formato [[pregunta],[respuesta]] para Matemática.</div>`;
    return;
  }

  // Tema chips
  const temaList = document.getElementById('tema-list');
  for (const [tema, items] of Object.entries(grouped)) {
    const chip = document.createElement('span');
    chip.className = 'tema-chip';
    chip.textContent = `${tema} (${items.length})`;
    temaList.appendChild(chip);
  }

  // Qty buttons
  const qtyGrid = document.getElementById('qty-grid');
  const qtys = [10, 20, 30, 50].filter(n => n <= totalAvailable);
  if (totalAvailable > 0 && !qtys.includes(totalAvailable)) qtys.push(totalAvailable);
  qtys.sort((a, b) => a - b);
  for (const n of qtys) {
    const btn = document.createElement('button');
    btn.className = 'qty-btn';
    btn.textContent = n;
    btn.onclick = () => selectQty(n);
    qtyGrid.appendChild(btn);
  }

  document.getElementById('loading-state').style.display = 'none';
  showScreen('screen-setup');
}

function selectQty(n) {
  selectedQty = n;
  document.querySelectorAll('.qty-btn').forEach(b => b.classList.toggle('sel', +b.textContent === n));
  document.getElementById('btn-start').disabled = false;
}

function startQuiz() {
  if (!selectedQty) return;
  pool = selectProportional(grouped, selectedQty);
  current = 0; score = 0; subtemaScore = {};
  showScreen('screen-quiz');
  showQ();
}

function showSetup() {
  selectedQty = 0;
  document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('btn-start').disabled = true;
  showScreen('screen-setup');
}

function showQ() {
  const item = pool[current];
  document.getElementById('prog-fill').style.width = (current / pool.length * 100) + '%';
  document.getElementById('prog-txt').textContent = `${current + 1} / ${pool.length}`;
  document.getElementById('q-tema').textContent = item.subtema;
  const qtEl = document.getElementById('q-text');
  qtEl.innerHTML = '$' + item.q + '$';
  document.getElementById('answer-block').classList.remove('visible');
  document.getElementById('q-answer').innerHTML = '';
  document.getElementById('btn-reveal').style.display = '';
  document.getElementById('action-row').style.display = 'none';
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise([qtEl]).catch(() => {});
}

function revealAnswer() {
  const item = pool[current];
  const qaEl = document.getElementById('q-answer');
  qaEl.innerHTML = '$' + item.a + '$';
  document.getElementById('answer-block').classList.add('visible');
  document.getElementById('btn-reveal').style.display = 'none';
  document.getElementById('action-row').style.display = 'flex';
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise([qaEl]).catch(() => {});
}

function markAnswer(correct) {
  const item = pool[current];
  if (!subtemaScore[item.subtema]) subtemaScore[item.subtema] = { correct: 0, total: 0 };
  subtemaScore[item.subtema].total++;
  if (correct) { score++; subtemaScore[item.subtema].correct++; }
  current++;
  if (current >= pool.length) showResult(); else showQ();
}

function showResult() {
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-label').textContent = `de ${pool.length} correctas`;
  const bars = document.getElementById('res-bars');
  bars.innerHTML = '';
  for (const [tema, s] of Object.entries(subtemaScore)) {
    const pct = s.total ? Math.round(s.correct / s.total * 100) : 0;
    bars.innerHTML += `<div class="bar-row">
      <div class="bar-lbl">${tema}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-pct">${pct}%</div>
    </div>`;
  }
  showScreen('screen-result');
}

init().catch(err => {
  console.error(err);
  document.getElementById('loading-state').innerHTML =
    `<div style="color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:13px;text-align:center;padding:20px">${err.message}</div>`;
});
</script>
</body>
</html>
