<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, viewport-fit=cover"/>
  <title>Herramientas · Charly Táctico</title>
  <link rel="icon" href="./favicon.ico" sizes="any"/>
  <link rel="icon" href="./icons/icon-32.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./icons/icon-180.png"/>
  <meta name="theme-color" content="#090e0a"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script>MathJax={tex:{inlineMath:[['$','$']],displayMath:[['$$','$$']]},startup:{typeset:false}};</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#090e0a;--navy2:#0e1a10;--navy3:#132815;
      --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e199;
      --white:#f0f4f0;--muted:#7a9080;
      --border:rgba(201,168,76,0.22);--glow:rgba(201,168,76,0.12);
      --topbar-bg:rgba(9,14,10,0.97);
      --green:#4caf7d;--red:#e05555;--yellow:#e8c96a;--blue:#6ab0e8;
    }
    html,body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh}

    /* ── Topbar ── */
    .topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--topbar-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:100}
    .tb-back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;padding:6px 10px;transition:color .2s}
    .tb-back:hover{color:var(--gold)}
    .tb-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;color:var(--gold)}
    .tb-brand span{color:var(--white)}
    .tb-sep{flex:1}
    .tb-rol{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
    .tb-user{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--white)}

    /* ── Sidebar ── */
    .layout{display:flex;padding-top:56px;min-height:100vh}
    .sidebar{width:210px;flex-shrink:0;background:var(--navy2);border-right:1px solid var(--border);position:fixed;top:56px;bottom:0;overflow-y:auto;z-index:50}
    .sb-sec{padding:16px 0 4px}
    .sb-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:600;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;padding:0 18px 8px}
    .sb-btn{display:flex;align-items:center;gap:10px;padding:11px 18px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:none;border:none;border-left:2px solid transparent;width:100%;text-align:left;cursor:pointer;transition:all .2s}
    .sb-btn:hover{color:var(--white);background:var(--navy3)}
    .sb-btn.active{color:var(--gold);border-left-color:var(--gold);background:var(--navy3)}
    .sb-btn .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}

    /* ── Main ── */
    .main{margin-left:210px;flex:1;padding:28px 24px;min-height:calc(100vh - 56px)}
    .panel{display:none}.panel.active{display:block}

    /* ── Botones ── */
    .btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:9px 18px;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
    .btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold2)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-red{background:transparent;border:1px solid var(--red);color:var(--red)}.btn-red:hover{background:var(--red);color:var(--white)}
    .btn-green{background:var(--green);color:var(--white)}.btn-green:hover{filter:brightness(1.1)}
    .btn:disabled{opacity:.4;cursor:not-allowed}

    /* ── Panel header ── */
    .ph{margin-bottom:24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .ph-left .eye{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
    .ph-left .ttl{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1}

    /* ── Stat card ── */
    .sc{background:var(--navy2);border:1px solid var(--border);padding:20px 18px;position:relative;overflow:hidden}
    .sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
    .sc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .sc-val{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--gold);line-height:1}

    /* ── Form grid ── */
    .fg{margin-bottom:14px}
    .fg label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .fg input,.fg select,.fg textarea{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
    .fg select option{background:var(--navy2)}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .fgrid .full{grid-column:1/-1}

    /* ── Empty state ── */
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .empty .ei{font-size:36px;margin-bottom:10px}
    .empty .et{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.1em;text-transform:uppercase}

    /* ── Tabs (reutilizados por BP) ── */
    .aula-tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:0}
    .aula-tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:8px 18px;background:var(--navy2);border:1px solid var(--border);border-bottom:none;color:var(--muted);cursor:pointer;transition:all .2s}
    .aula-tab.active{background:var(--navy3);color:var(--gold);border-color:var(--gold)}

    /* ── Badge rol profesor ── */
    .rol-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:3px 8px;background:rgba(201,168,76,.12);border:1px solid var(--border);color:var(--gold);margin-left:10px;vertical-align:middle}

    /* ── Responsive ── */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);transition:transform .3s}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.5)}
      .main{margin-left:0;padding:18px 14px}
      .fgrid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <button class="tb-back" id="btn-volver" onclick="history.back()">← Volver</button>
  <div class="tb-brand">CHARLY <span>TÁCTICO</span></div>
  <div class="tb-sep"></div>
  <div style="text-align:right">
    <div class="tb-rol" id="topbar-rol"></div>
    <div class="tb-user" id="topbar-user"></div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-sec">
      <div class="sb-lbl">Herramientas</div>
      <button class="sb-btn active" id="sb-banco" onclick="showTool('banco',this)">
        <span class="ic">📚</span> Banco de Preguntas
      </button>
      <button class="sb-btn" id="sb-armador" onclick="showTool('armador',this)">
        <span class="ic">🗂</span> Armar Práctica
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- BANCO DE PREGUNTAS -->
    <div class="panel active" id="panel-banco">
      <div id="bp-root">
        <div class="empty"><div class="ei">📚</div><div class="et">Cargando banco de preguntas…</div></div>
      </div>
    </div>

    <!-- ARMADOR DE PRÁCTICA -->
    <div class="panel" id="panel-armador">
      <div id="gp-root">
        <div class="empty"><div class="ei">🗂</div><div class="et">Cargando generador…</div></div>
      </div>
    </div>

  </div>
</div>

<!-- DIALOG PERSONALIZADO -->
<div id="dlg-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center">
  <div style="background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:28px 24px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.5)">
    <div id="dlg-msg" style="font-family:'Barlow',sans-serif;font-size:15px;color:var(--white);line-height:1.5;margin-bottom:20px;white-space:pre-line"></div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button id="dlg-cancel" class="btn btn-outline" style="font-size:13px;padding:7px 18px" onclick="_dlgCancel()">Cancelar</button>
      <button class="btn btn-gold" style="font-size:13px;padding:7px 18px" onclick="_dlgOk()">Aceptar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-global" style="display:none;position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-16px);z-index:10000;background:#0d1b0e;border:1.5px solid var(--gold);color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;padding:12px 22px;box-shadow:0 6px 28px rgba(0,0,0,.55);pointer-events:none;transition:opacity .25s,transform .25s;opacity:0;white-space:nowrap;max-width:90vw;text-align:center"></div>

<script>
/* ════════════════════════════════════════════════════
   CONSTANTES
════════════════════════════════════════════════════ */
const SB_URL = 'https://jfczouzgikqxcnotukag.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmY3pvdXpnaWtxeGNub3R1a2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODU1NjgsImV4cCI6MjA4ODg2MTU2OH0.Q8MRAj-AFPm8fsJsg52hxDSMdjf9YJRuGbhs4WrOEcA';
const STORAGE = SB_URL + '/storage/v1/object/public/';
const sb = supabase.createClient(SB_URL, SB_KEY);

/* ════════════════════════════════════════════════════
   ESTADO GLOBAL
════════════════════════════════════════════════════ */
let allMaterias = [];
let allowedMateriaIds = null; // null = sin restricción (admin); array = solo estas (profesor)
let _currentTool = 'banco';

/* ════════════════════════════════════════════════════
   PANEL SWITCHING
════════════════════════════════════════════════════ */
function showTool(tool, btn) {
  _currentTool = tool;
  document.getElementById('panel-banco').classList.toggle('active', tool === 'banco');
  document.getElementById('panel-armador').classList.toggle('active', tool === 'armador');
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  const sbBtn = btn || document.getElementById('sb-' + tool);
  if (sbBtn) sbBtn.classList.add('active');

  if (tool === 'armador') {
    if (typeof gpIniciar === 'function') gpIniciar();
  } else {
    if (typeof bpIniciar === 'function') bpIniciar();
  }
}

/* Compatibilidad: academico_tools.js llama showPanel('armar-practica') */
function showPanel(id) {
  if (id === 'armar-practica') showTool('armador');
}

/* ════════════════════════════════════════════════════
   LOAD MATERIAS — con filtro de rol
════════════════════════════════════════════════════ */
async function loadMaterias() {
  let q = sb.from('materias').select('*').order('nombre');
  if (allowedMateriaIds) q = q.in('id', allowedMateriaIds);
  const { data } = await q;
  allMaterias = data || [];
}

/* No-op: admin.html llama renderMaterias() desde loadMaterias() */
function renderMaterias() {}

/* ════════════════════════════════════════════════════
   DIALOGS
════════════════════════════════════════════════════ */
let _dialogResolve = null;
function _openDialog(msg, isConfirm) {
  return new Promise(resolve => {
    _dialogResolve = resolve;
    document.getElementById('dlg-msg').textContent = msg;
    document.getElementById('dlg-cancel').style.display = isConfirm ? '' : 'none';
    document.getElementById('dlg-overlay').style.display = 'flex';
  });
}
function myAlert(msg)   { return _openDialog(msg, false); }
function myConfirm(msg) { return _openDialog(msg, true);  }
function _dlgOk()    { document.getElementById('dlg-overlay').style.display='none'; if(_dialogResolve){_dialogResolve(true);_dialogResolve=null;} }
function _dlgCancel(){ document.getElementById('dlg-overlay').style.display='none'; if(_dialogResolve){_dialogResolve(false);_dialogResolve=null;} }

/* ════════════════════════════════════════════════════
   PDF SAVE (multiplataforma)
════════════════════════════════════════════════════ */
function _toast(msg, ms=6000) {
  let t = document.getElementById('_toast-el');
  if (!t) {
    t = document.createElement('div'); t.id = '_toast-el';
    t.style.cssText = 'position:fixed;bottom:max(80px,env(safe-area-inset-bottom,80px));left:50%;transform:translateX(-50%);background:#0d1a0e;color:#c9a84c;border:1px solid #c9a84c55;padding:12px 18px;border-radius:10px;font-size:13px;z-index:9999;max-width:85vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:opacity .4s;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._tid); t._tid = setTimeout(() => { t.style.opacity = '0'; }, ms);
}

function _pdfSave(doc, filename) {
  const base64 = doc.output('datauristring').split(',')[1];
  if (window.AndroidNative && typeof window.AndroidNative.savePdfBase64 === 'function') {
    window.AndroidNative.savePdfBase64(base64, filename); return;
  }
  const blob = doc.output('blob');
  const url = URL.createObjectURL(blob);
  if (/iPad|iPhone|iPod/i.test(navigator.userAgent)) {
    const w = window.open(url, '_blank');
    if (!w) window.location.href = url;
    setTimeout(() => URL.revokeObjectURL(url), 20000);
    _toast('Toca el ícono ↑ Compartir → "Guardar en Archivos" para guardar el PDF en tu iPhone');
    return;
  }
  if (/Android/i.test(navigator.userAgent)) {
    window.location.href = url; setTimeout(() => URL.revokeObjectURL(url), 8000); return;
  }
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

/* ════════════════════════════════════════════════════
   AUTH + INIT
════════════════════════════════════════════════════ */
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = './login.html?next=herramientas.html'; return; }

  const { data: perfil } = await sb.from('perfiles')
    .select('rol,nombre,apellido').eq('id', session.user.id).single();

  if (!perfil || !['admin','instructor','dueno','profesor','delegado'].includes(perfil.rol)) {
    await sb.auth.signOut(); window.location.href = './login.html'; return;
  }

  document.getElementById('topbar-user').textContent = `${perfil.nombre} ${perfil.apellido}`;
  document.getElementById('topbar-rol').textContent = perfil.rol.toUpperCase();

  /* Filtro de materias para profesor */
  if (perfil.rol === 'profesor') {
    const { data: prof } = await sb.from('profesores')
      .select('id').eq('perfil_id', session.user.id).single();
    if (prof) {
      const { data: mp } = await sb.from('materia_profesor')
        .select('materia_id').eq('profesor_id', prof.id);
      allowedMateriaIds = (mp || []).map(m => m.materia_id);
    }
  }

  await loadMaterias();

  /* Detectar panel inicial por URL param */
  const urlPanel = new URLSearchParams(location.search).get('panel');
  if (urlPanel === 'armador') {
    showTool('armador', document.getElementById('sb-armador'));
  } else {
    if (typeof bpIniciar === 'function') bpIniciar();
  }
}
</script>

<!-- HERRAMIENTAS: banco de preguntas + armador de práctica -->
<script src="./academico_tools.js"></script>

<script>
  init();
</script>
</body>
</html>
