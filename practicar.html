<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>¡A Practicar! · Charly Táctico</title>
  <link rel="icon" href="./favicon.ico" sizes="any"/>
  <link rel="icon" href="./icons/icon-32.png" type="image/png"/>
  <link rel="apple-touch-icon" href="./icons/icon-180.png"/>
  <meta name="theme-color" content="#080C10"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #080C10;
      --gold:   #C9A84C;
      --gold2:  #e5c46a;
      --lime:   #9DD900;
      --chalk:  #F0F4F8;
      --navy2:  #0d1117;
      --navy3:  #13191f;
      --border: rgba(201,168,76,.15);
      --muted:  #8892a0;
      --red:    #E05555;
      --orange: #E07A35;
    }

    html { background: var(--black); }
    body {
      background: var(--black);
      color: var(--chalk);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,.022) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none; z-index: 0;
    }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      background: rgba(8,12,16,.93);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 18px; z-index: 100; gap: 10px;
    }
    .tb-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); background: none; border: none;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 5px;
      padding: 6px 10px; transition: color .2s;
    }
    .tb-back:hover { color: var(--gold); }
    .tb-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px; letter-spacing: .05em; color: var(--gold);
    }
    .tb-brand span { color: var(--chalk); }
    .tb-sep { flex: 1; }

    /* APP */
    .app {
      padding-top: 54px;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 1;
      padding-bottom: 60px;
    }

    /* HERO */
    .hero {
      width: 100%; max-width: 900px;
      padding: 40px 20px 12px;
    }
    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 600;
      letter-spacing: .35em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 13vw, 76px);
      line-height: .9; margin-bottom: 6px;
    }
    .hero-title .hl { color: var(--gold); }
    .hero-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; letter-spacing: .06em; color: var(--muted);
      margin-bottom: 0;
    }

    /* SECTION */
    .section {
      width: 100%; max-width: 900px;
      padding: 28px 20px 8px;
    }
    .sec-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px;
    }
    .sec-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: .1em; color: var(--chalk);
    }
    .sec-line {
      flex: 1; height: 1px;
      background: var(--border);
    }

    /* GRID */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    /* CARD */
    .course-card {
      background: var(--navy2);
      border: 1px solid var(--border);
      padding: 22px 16px 18px;
      cursor: pointer;
      text-decoration: none;
      display: flex; flex-direction: column;
      align-items: flex-start;
      position: relative; overflow: hidden;
      transition: border-color .18s, background .18s;
    }
    .course-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform .18s;
    }
    .course-card:hover { border-color: rgba(201,168,76,.5); background: var(--navy3); }
    .course-card:hover::after { transform: scaleX(1); }
    .course-card.disabled {
      pointer-events: none;
      opacity: .55;
      cursor: default;
    }

    .card-ico {
      font-size: 28px;
      margin-bottom: 10px;
      line-height: 1;
    }
    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px; letter-spacing: .06em;
      color: var(--chalk); line-height: 1.1;
      margin-bottom: 4px;
    }
    .card-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; letter-spacing: .04em;
      color: var(--muted); margin-bottom: 10px;
      line-height: 1.4; flex: 1;
    }
    .card-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid;
      align-self: flex-start;
    }
    .card-tag.quiz  { color: var(--gold);  border-color: rgba(201,168,76,.4);  background: rgba(201,168,76,.07); }
    .card-tag.flash { color: var(--lime);  border-color: rgba(157,217,0,.4);   background: rgba(157,217,0,.06); }
    .card-tag.prox  { color: var(--orange); border-color: rgba(224,122,53,.4); background: rgba(224,122,53,.07); }

    /* Loading state */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; gap: 14px; width: 100%;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(201,168,76,.18);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; letter-spacing: .2em;
      text-transform: uppercase; color: var(--muted);
    }

    @media (max-width: 640px) {
      .course-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .course-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="tb-back" href="./dashboard.html">← Inicio</a>
  <div class="tb-brand">CHARLY <span>TÁCTICO</span></div>
  <div class="tb-sep"></div>
</div>

<div class="app">

  <!-- HERO -->
  <div class="hero">
    <div class="eyebrow">Portal del Alumno</div>
    <div class="hero-title">¡A <span class="hl">PRACTICAR!</span></div>
    <div class="hero-sub">Selecciona un curso y empieza a entrenar</div>
  </div>

  <!-- Loading -->
  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando cursos…</div>
  </div>

  <!-- LETRAS -->
  <div class="section" id="section-letras" style="display:none">
    <div class="sec-header">
      <div class="sec-title">LETRAS</div>
      <div class="sec-line"></div>
    </div>
    <div class="course-grid" id="grid-letras"></div>
  </div>

  <!-- MATEMÁTICAS -->
  <div class="section" id="section-mates" style="display:none">
    <div class="sec-header">
      <div class="sec-title">MATEMÁTICAS</div>
      <div class="sec-line"></div>
    </div>
    <div class="course-grid" id="grid-mates"></div>
  </div>

</div><!-- /app -->

<script>
const SB_URL = 'https://jfczouzgikqxcnotukag.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9'
             + '.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmY3pvdXpnaWtxeGNub3R1a2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODU1NjgsImV4cCI6MjA4ODg2MTU2OH0'
             + '.Q8MRAj-AFPm8fsJsg52hxDSMdjf9YJRuGbhs4WrOEcA';
const sb = supabase.createClient(SB_URL, SB_KEY);

/* ── Configuración de cursos ─────────────────────────────────────────── */
const SPECIAL_LETRAS = [
  {
    nombre: 'Sinónimos y Antónimos',
    ico: '↔',
    sub: 'Léxico táctico',
    link: './quiz_rv.html',
    tipo: null,
  },
  {
    nombre: 'Vocabulario',
    ico: '📖',
    sub: 'Definiciones',
    link: './quiz_definiciones.html',
    tipo: null,
  },
];

const GENERIC_LETRAS = [
  { nombre: 'Razonamiento Verbal', ico: '🧠', sub: 'Comprensión · Textos', tipo: 'quiz', modo: 'rv', matchNombre: ['razonamiento verbal'], matchCodigo: ['RV-01'] },
  { nombre: 'Lenguaje',            ico: '✍️', sub: 'Gramática · Ortografía', tipo: 'quiz', matchNombre: ['lenguaje'], matchCodigo: [] },
  { nombre: 'Literatura',          ico: '📚', sub: 'Movimientos · Autores',   tipo: 'quiz', matchNombre: ['literatura'], matchCodigo: [] },
  { nombre: 'Biología',            ico: '🧬', sub: 'Ciencias de la Vida',     tipo: 'quiz', matchNombre: ['biolog'], matchCodigo: ['BIO-01'] },
  { nombre: 'Cívica',              ico: '⚖️', sub: 'Estado · Ciudadanía',     tipo: 'quiz', matchNombre: ['cívica','civica'], matchCodigo: ['CIV-01'] },
  { nombre: 'Geografía',           ico: '🌎', sub: 'Territorio · Relieve',    tipo: 'quiz', matchNombre: ['geografía','geografia'], matchCodigo: ['GEO-01'] },
  { nombre: 'Historia del Perú',   ico: '🏛️', sub: 'Desde los orígenes',     tipo: 'quiz', matchNombre: ['historia del per'], matchCodigo: [] },
  { nombre: 'Historia Universal',  ico: '🌍', sub: 'Historia global',         tipo: 'quiz', matchNombre: ['historia universal'], matchCodigo: [] },
  { nombre: 'Psicología',          ico: '🔬', sub: 'Mente · Comportamiento',  tipo: 'quiz', matchNombre: ['psicolog'], matchCodigo: ['PSICO-01'] },
];

const GENERIC_MATES = [
  { nombre: 'Matemática',             ico: '∑',  sub: 'Aritmética · Cálculo',      tipo: 'flash', matchNombre: ['matemática'], matchCodigo: ['MA-01'] },
  { nombre: 'Razonamiento Matemático',ico: '🔢', sub: 'Lógica · Problemas',         tipo: 'flash', matchNombre: ['razonamiento mat'], matchCodigo: ['RM-01'] },
  { nombre: 'Álgebra',                ico: '𝑥',  sub: 'Ecuaciones · Polinomios',    tipo: 'flash', matchNombre: ['álgebra','algebra'], matchCodigo: ['AL-01'] },
  { nombre: 'Trigonometría',          ico: '📐', sub: 'Ángulos · Funciones',        tipo: 'flash', matchNombre: ['trigonometr'], matchCodigo: ['TRIGO-01'] },
  { nombre: 'Física',                 ico: '⚡', sub: 'Mecánica · Electricidad',    tipo: 'flash', matchNombre: ['física','fisica'], matchCodigo: ['FI-01'] },
];

/* ── Helpers ─────────────────────────────────────────────────────────── */
function matchMateria(config, materias) {
  const codes = (config.matchCodigo || []).map(c => c.toLowerCase());
  const names  = (config.matchNombre || []).map(n => n.toLowerCase());
  return materias.find(m => {
    const mCod  = (m.codigo || '').toLowerCase();
    const mNom  = (m.nombre || '').toLowerCase();
    if (codes.length && codes.some(c => mCod === c)) return true;
    if (names.length && names.some(n => mNom.includes(n))) return true;
    return false;
  }) || null;
}

function buildLink(config, materia) {
  let url = `./quiz_curso.html?materia_id=${materia.id}&nombre=${encodeURIComponent(materia.nombre)}&tipo=${config.tipo}`;
  if (config.modo) url += `&modo=${config.modo}`;
  return url;
}

function renderCard(container, { ico, nombre, sub, tipo, link, disabled }) {
  const a = document.createElement('a');
  a.className = 'course-card' + (disabled ? ' disabled' : '');
  a.href = disabled ? '#' : link;

  let tagHtml = '';
  if (tipo === 'quiz')  tagHtml = '<span class="card-tag quiz">Quiz</span>';
  else if (tipo === 'flash') tagHtml = '<span class="card-tag flash">Flashcards</span>';
  else if (disabled)    tagHtml = '<span class="card-tag prox">Próximamente</span>';

  a.innerHTML =
    `<div class="card-ico">${ico}</div>` +
    `<div class="card-name">${nombre}</div>` +
    `<div class="card-sub">${sub}</div>` +
    tagHtml;

  container.appendChild(a);
}

/* ── Init ────────────────────────────────────────────────────────────── */
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = './login.html?rol=alumno&next=practicar.html';
    return;
  }

  const { data: materias, error } = await sb.from('materias').select('id,nombre,codigo');
  if (error) console.error('[practicar] materias error:', error);

  const all = materias || [];

  const gridL = document.getElementById('grid-letras');
  const gridM = document.getElementById('grid-mates');

  // Tarjetas especiales siempre visibles
  for (const s of SPECIAL_LETRAS) {
    renderCard(gridL, { ico: s.ico, nombre: s.nombre, sub: s.sub, tipo: null, link: s.link, disabled: false });
  }

  // Cursos genéricos Letras
  for (const cfg of GENERIC_LETRAS) {
    const mat = matchMateria(cfg, all);
    if (mat) {
      renderCard(gridL, { ico: cfg.ico, nombre: mat.nombre, sub: cfg.sub, tipo: cfg.tipo, link: buildLink(cfg, mat), disabled: false });
    } else {
      renderCard(gridL, { ico: cfg.ico, nombre: cfg.nombre, sub: cfg.sub, tipo: null, link: '#', disabled: true });
    }
  }

  // Cursos genéricos Matemáticas
  for (const cfg of GENERIC_MATES) {
    const mat = matchMateria(cfg, all);
    if (mat) {
      renderCard(gridM, { ico: cfg.ico, nombre: mat.nombre, sub: cfg.sub, tipo: cfg.tipo, link: buildLink(cfg, mat), disabled: false });
    } else {
      renderCard(gridM, { ico: cfg.ico, nombre: cfg.nombre, sub: cfg.sub, tipo: null, link: '#', disabled: true });
    }
  }

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('section-letras').style.display = '';
  document.getElementById('section-mates').style.display = '';
}

init().catch(err => {
  console.error('[practicar] init error:', err);
  document.getElementById('loading-state').innerHTML =
    `<div style="color:var(--red);font-family:'Barlow Condensed',sans-serif;
     font-size:13px;letter-spacing:.1em;text-align:center;line-height:1.6">
     ${err.message || 'Error al cargar cursos.'}<br>
     <span style="color:var(--muted)">Verifica tu conexión e intenta de nuevo.</span>
     </div>`;
});
</script>
</body>
</html>
